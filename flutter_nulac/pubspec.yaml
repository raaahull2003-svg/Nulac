name: nulac
description: Nulac Premium Dairy Mobile Application (Pure • Fresh • Farm Direct)
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI and Navigation
  cupertino_icons: ^1.0.5
  google_fonts: ^5.1.0
  flutter_svg: ^2.0.7
  carousel_slider: ^4.2.1
  motion_tab_bar: ^0.2.7
  shimmer: ^3.1.0

  # Clean Architecture & State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  get_it: ^7.6.0
  dartz: ^0.10.1

  # Network & Database
  http: ^1.1.0
  shared_preferences: ^2.2.1

  # Firebase Cloud Messaging & Push Notifications
  firebase_core: ^2.24.0
  firebase_messaging: ^14.7.10
  flutter_local_notifications: ^16.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - assets/images/milk_bottle.png
    - assets/images/ghee_jar.png
    - assets/images/dahi_cup.png
    - assets/images/paneer_pack.png
    - assets/images/home_banner.png
